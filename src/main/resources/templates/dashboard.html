<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComTec - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .welcome-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #0d6efd 100%);
            color: white;
            border-radius: 16px;
            padding: 2rem;
        }

        .stat-card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: transform .2s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                <i class="fas fa-network-wired me-2"></i>ComTec
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">

                    <!-- Seguridad: solo si tiene módulos con permiso -->
                    <li class="nav-item dropdown" th:if="${menuSeguridad != null and !menuSeguridad.empty}">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-shield-alt me-1"></i>Seguridad
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="m : ${menuSeguridad}">
                                <a class="dropdown-item" th:href="${rutasModulo[m.modulo.strNombreModulo]}">
                                    <i th:class="${m.modulo.strNombreModulo == 'Perfil'}
                                             ? 'fas fa-id-card me-2'
                                             : (${m.modulo.strNombreModulo == 'Módulo'}
                                                ? 'fas fa-cubes me-2'
                                                : (${m.modulo.strNombreModulo == 'Permisos-Perfil'}
                                                   ? 'fas fa-key me-2'
                                                   : 'fas fa-users me-2'))">
                                    </i>
                                    <span th:text="${m.modulo.strNombreModulo}"></span>
                                </a>
                            </li>
                        </ul>
                    </li>

                    <!-- Principal 1: solo si tiene módulos con permiso -->
                    <li class="nav-item dropdown" th:if="${menuPrincipal1 != null and !menuPrincipal1.empty}">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-th-large me-1"></i>Principal 1
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="m : ${menuPrincipal1}">
                                <a class="dropdown-item" th:href="${m.modulo.strNombreModulo == 'Principal 1.1'}
                                        ? '/principal/1-1' : '/principal/1-2'">
                                    <i class="fas fa-circle me-2 small"></i>
                                    <span th:text="${m.modulo.strNombreModulo}"></span>
                                </a>
                            </li>
                        </ul>
                    </li>

                    <!-- Principal 2: solo si tiene módulos con permiso -->
                    <li class="nav-item dropdown" th:if="${menuPrincipal2 != null and !menuPrincipal2.empty}">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-th me-1"></i>Principal 2
                        </a>
                        <ul class="dropdown-menu">
                            <li th:each="m : ${menuPrincipal2}">
                                <a class="dropdown-item" th:href="${m.modulo.strNombreModulo == 'Principal 2.1'}
                                        ? '/principal/2-1' : '/principal/2-2'">
                                    <i class="fas fa-circle me-2 small"></i>
                                    <span th:text="${m.modulo.strNombreModulo}"></span>
                                </a>
                            </li>
                        </ul>
                    </li>

                </ul>

                <!-- Usuario logueado -->
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#"
                            data-bs-toggle="dropdown">
                            <img th:src="${imagenUsuarioUrl ?: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                                class="rounded-circle" style="width:32px;height:32px;object-fit:cover;" alt="foto">

                            <span th:text="${usuario.strNombreUsuario}"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <h6 class="dropdown-header" th:text="${usuario.perfil.strNombrePerfil}"></h6>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item text-danger" href="#" id="btnLogout">
                                    <i class="fas fa-sign-out-alt me-2"></i>Cerrar sesión
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4 px-4">

        <!-- BREADCRUMB -->
        <nav aria-label="breadcrumb" class="breadcrumb-wrapper">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item active">
                    <i class="fas fa-home me-1"></i>Inicio
                </li>
            </ol>
        </nav>

        <!-- BIENVENIDA -->
        <div class="welcome-card mb-4">
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <img th:src="${imagenUsuarioUrl ?: 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                    class="rounded-circle border border-white border-3" style="width:70px;height:70px;object-fit:cover;"
                    alt="foto">
                <div>
                    <h4 class="mb-1">
                        ¡Bienvenido,
                        <strong th:text="${usuario.strNombreUsuario}"></strong>!
                    </h4>
                    <p class="mb-0 opacity-75">
                        <i class="fas fa-id-badge me-1"></i>
                        <span th:text="${usuario.perfil.strNombrePerfil}"></span>
                        &nbsp;·&nbsp;
                        <i class="fas fa-envelope me-1"></i>
                        <span th:text="${usuario.strCorreo ?: 'Sin correo registrado'}"></span>
                    </p>
                </div>
            </div>
        </div>

        <!-- TARJETAS DE MÓDULOS DISPONIBLES -->
        <div th:if="${tarjetas != null and !tarjetas.empty}">
            <h6 class="text-muted fw-semibold mb-3">
                <i class="fas fa-th-large me-2"></i>Módulos disponibles
            </h6>
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3" th:each="t : ${tarjetas}">
                    <a th:href="${t['ruta']}" class="text-decoration-none">
                        <div class="card stat-card h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="stat-icon" th:classappend="${t['colorClass']}">
                                    <i th:class="${t['icono']}"></i>
                                </div>
                                <div>
                                    <p class="mb-0 fw-semibold small text-dark" th:text="${t['nombre']}"></p>
                                    <small class="text-muted" th:text="${t['menuNombre']}"></small>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- SIN PERMISOS -->
        <div th:if="${tarjetas == null or tarjetas.empty}" class="alert alert-warning">
            <i class="fas fa-exclamation-triangle me-2"></i>
            No tienes módulos asignados. Contacta al administrador.
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</body>

</html>
