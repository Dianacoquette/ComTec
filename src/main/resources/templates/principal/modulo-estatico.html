<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'ComTec - ' + ${moduloTitulo}">ComTec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="fas fa-network-wired me-2"></i>ComTec
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" id="btnLogout">
                        <i class="fas fa-sign-out-alt me-1"></i>Cerrar sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">

    <!-- BREADCRUMB -->
    <nav aria-label="breadcrumb" class="breadcrumb-wrapper">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
                <a href="/dashboard"><i class="fas fa-home me-1"></i>Inicio</a>
            </li>
            <li class="breadcrumb-item" th:text="${parentMenu}"></li>
            <li class="breadcrumb-item active" th:text="${breadcrumbItem}"></li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span>
                <i class="fas fa-th-large me-2"></i>
                <span th:text="${moduloTitulo}"></span>
            </span>
            <!-- Botón Nuevo: solo si tiene permiso agregar -->
            <button th:if="${pAgregar}"
                    class="btn btn-light btn-sm"
                    onclick="mostrarDemo('Nuevo')">
                <i class="fas fa-plus me-1"></i>Nuevo
            </button>
        </div>
        <div class="card-body">

            <!-- BUSCADOR: solo si tiene permiso consulta -->
            <div class="row mb-3" th:if="${pConsulta}">
                <div class="col-md-4">
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Buscar...">
                        <button class="btn btn-outline-primary"
                                onclick="mostrarDemo('Buscar')">
                            <i class="fas fa-search"></i>
                        </button>
                        <button class="btn btn-outline-secondary"
                                onclick="mostrarDemo('Limpiar')">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- TABLA ESTÁTICA -->
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Campo 1</th>
                            <th>Campo 2</th>
                            <th>Campo 3</th>
                            <!-- Columna acciones: solo si tiene al menos un permiso -->
                            <th class="text-center"
                                th:if="${pDetalle or pEditar or pEliminar}">
                                Acciones
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="i : ${#numbers.sequence(1, 2)}">
                            <td th:text="${i}"></td>
                            <td th:text="'Dato de ejemplo ' + ${i * 3 - 2}"></td>
                            <td th:text="'Dato de ejemplo ' + ${i * 3 - 1}"></td>
                            <td th:text="'Dato de ejemplo ' + ${i * 3}"></td>
                            <!-- Celda acciones: solo si tiene al menos un permiso -->
                            <td class="text-center"
                                th:if="${pDetalle or pEditar or pEliminar}">
                                <button th:if="${pDetalle}"
                                        class="btn btn-info btn-sm btn-action"
                                        onclick="mostrarDemo('Ver Detalle')"
                                        title="Detalle">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button th:if="${pEditar}"
                                        class="btn btn-warning btn-sm btn-action"
                                        onclick="mostrarDemo('Editar')"
                                        title="Editar">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button th:if="${pEliminar}"
                                        class="btn btn-danger btn-sm btn-action"
                                        onclick="mostrarDemo('Eliminar')"
                                        title="Eliminar">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- PAGINACIÓN ESTÁTICA -->
            <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
                <small class="text-muted">Mostrando 2 de 2 registro(s)</small>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item disabled">
                            <a class="page-link" href="#">«</a>
                        </li>
                        <li class="page-item disabled">
                            <a class="page-link" href="#">‹</a>
                        </li>
                        <li class="page-item active">
                            <a class="page-link" href="#">1</a>
                        </li>
                        <li class="page-item disabled">
                            <a class="page-link" href="#">›</a>
                        </li>
                        <li class="page-item disabled">
                            <a class="page-link" href="#">»</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DEMO -->
<div class="modal fade" id="modalDemo" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalDemoTitulo">Acción</h5>
                <button type="button" class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="fas fa-info-circle fa-3x text-primary mb-3 d-block"></i>
                <p class="mb-0">
                    Módulo estático — acción
                    <strong id="modalDemoAccion"></strong>
                    disponible en implementación futura.
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm"
                        data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMensaje"></div>
            <button type="button" class="btn-close me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modalDemo = new bootstrap.Modal(document.getElementById('modalDemo'));

function mostrarDemo(accion) {
    document.getElementById('modalDemoTitulo').textContent = accion;
    document.getElementById('modalDemoAccion').textContent = accion;
    modalDemo.show();
}

document.getElementById('btnLogout').addEventListener('click', async e => {
    e.preventDefault();
    try { await fetch('/auth/logout', { method: 'POST' }); } finally {
        document.cookie = 'jwt_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
        window.location.href = '/login';
    }
});
</script>
</body>
</html>
