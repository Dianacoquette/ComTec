<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComTec - Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="fas fa-network-wired me-2"></i>ComTec
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" id="btnLogout">
                        <i class="fas fa-sign-out-alt me-1"></i>Cerrar sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">

    <!-- BREADCRUMB -->
    <nav aria-label="breadcrumb" class="breadcrumb-wrapper">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
                <a href="/dashboard"><i class="fas fa-home me-1"></i>Inicio</a>
            </li>
            <li class="breadcrumb-item">Seguridad</li>
            <li class="breadcrumb-item">
                <a href="/seguridad/perfil">Perfil</a>
            </li>
            <li class="breadcrumb-item active" id="breadcrumbAccion">Nuevo</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <span id="cardTitulo">
                        <i class="fas fa-plus me-2"></i>Nuevo Perfil
                    </span>
                </div>
                <div class="card-body">

                    <!-- Alerta error -->
                    <div id="alertError" class="alert alert-danger d-none">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span id="alertMensaje"></span>
                    </div>

                    <input type="hidden" id="perfilId"
                           th:value="${modo == 'editar' ? perfilId : ''}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Nombre del Perfil <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="perfilNombre" class="form-control"
                               placeholder="Ingresa el nombre del perfil" maxlength="100">
                        <div class="invalid-feedback" id="errorNombre"></div>
                    </div>

                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="perfilAdmin">
                            <label class="form-check-label fw-semibold" for="perfilAdmin">
                                Es Administrador
                            </label>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" id="btnGuardar">
                            <i class="fas fa-save me-1"></i>Guardar
                        </button>
                        <a href="/seguridad/perfil" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMensaje"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Pasa el modo (nuevo/editar) al JS -->
<script th:inline="javascript">
    /*<![CDATA[*/
    const MODO      = /*[[${modo}]]*/ 'nuevo';
    const PERFIL_ID = /*[[${perfilId != null ? perfilId : 0}]]*/ 0;
    /*]]>*/
</script>
<script th:src="@{/js/perfil-form.js}"></script>
</body>
</html>
