<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComTec - Permisos Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .permiso-card {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 1.25rem;
            background: #f8f9fa;
        }
        .permiso-card .form-check { margin-bottom: .5rem; }
        .check-todos { cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="fas fa-network-wired me-2"></i>ComTec
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" id="btnLogout">
                        <i class="fas fa-sign-out-alt me-1"></i>Cerrar sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">

    <!-- BREADCRUMB -->
    <nav aria-label="breadcrumb" class="breadcrumb-wrapper">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
                <a href="/dashboard"><i class="fas fa-home me-1"></i>Inicio</a>
            </li>
            <li class="breadcrumb-item">Seguridad</li>
            <li class="breadcrumb-item">
                <a href="/seguridad/permisos-perfil">Permisos-Perfil</a>
            </li>
            <li class="breadcrumb-item active" id="breadcrumbAccion">Nuevo</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card">
                <div class="card-header">
                    <span id="cardTitulo">
                        <i class="fas fa-plus me-2"></i>Nuevo Permiso
                    </span>
                </div>
                <div class="card-body">

                    <div id="alertError" class="alert alert-danger d-none">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span id="alertMensaje"></span>
                    </div>

                    <input type="hidden" id="permisoId"
                           th:value="${modo == 'editar' ? permisoId : ''}">

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Perfil <span class="text-danger">*</span>
                            </label>
                            <select id="permisoPerfil" class="form-select">
                                <option value="">-- Selecciona perfil --</option>
                            </select>
                            <div class="invalid-feedback" id="errorPerfil"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Módulo <span class="text-danger">*</span>
                            </label>
                            <select id="permisoModulo" class="form-select">
                                <option value="">-- Selecciona módulo --</option>
                            </select>
                            <div class="invalid-feedback" id="errorModulo"></div>
                        </div>
                    </div>

                    <!-- CHECKBOXES DE PERMISOS -->
                    <div class="permiso-card mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h6 class="mb-0 fw-bold">
                                <i class="fas fa-check-square me-2 text-primary"></i>
                                Acciones permitidas
                            </h6>
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input check-todos"
                                       type="checkbox" id="checkTodos">
                                <label class="form-check-label fw-semibold"
                                       for="checkTodos">Seleccionar todos</label>
                            </div>
                        </div>
                        <div class="row g-2">
                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input permiso-check"
                                           type="checkbox" id="chkAgregar">
                                    <label class="form-check-label" for="chkAgregar">
                                        <i class="fas fa-plus-circle text-success me-1"></i>
                                        Agregar
                                    </label>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input permiso-check"
                                           type="checkbox" id="chkEditar">
                                    <label class="form-check-label" for="chkEditar">
                                        <i class="fas fa-edit text-warning me-1"></i>
                                        Editar
                                    </label>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input permiso-check"
                                           type="checkbox" id="chkConsulta">
                                    <label class="form-check-label" for="chkConsulta">
                                        <i class="fas fa-search text-info me-1"></i>
                                        Consulta
                                    </label>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input permiso-check"
                                           type="checkbox" id="chkEliminar">
                                    <label class="form-check-label" for="chkEliminar">
                                        <i class="fas fa-trash text-danger me-1"></i>
                                        Eliminar
                                    </label>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div class="form-check">
                                    <input class="form-check-input permiso-check"
                                           type="checkbox" id="chkDetalle">
                                    <label class="form-check-label" for="chkDetalle">
                                        <i class="fas fa-eye text-primary me-1"></i>
                                        Detalle
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-primary" id="btnGuardar">
                            <i class="fas fa-save me-1"></i>Guardar
                        </button>
                        <a href="/seguridad/permisos-perfil" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMensaje"></div>
            <button type="button" class="btn-close me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const MODO      = /*[[${modo}]]*/ 'nuevo';
    const PERMISO_ID = /*[[${permisoId != null ? permisoId : 0}]]*/ 0;
    /*]]>*/
</script>
<script th:src="@{/js/permisos-perfil-form.js}"></script>
</body>
</html>
