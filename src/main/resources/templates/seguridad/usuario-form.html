<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComTec - Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <style>
        .img-preview-wrapper {
            width: 130px; height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #dee2e6;
            margin: 0 auto;
            background: #f8f9fa;
            display: flex; align-items: center; justify-content: center;
        }
        .img-preview-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .upload-area {
            border: 2px dashed #0d6efd;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: background .2s;
        }
        .upload-area:hover { background: #f0f4ff; }
        #inputImagen { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/dashboard">
            <i class="fas fa-network-wired me-2"></i>ComTec
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="#" id="btnLogout">
                        <i class="fas fa-sign-out-alt me-1"></i>Cerrar sesión
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">

    <nav aria-label="breadcrumb" class="breadcrumb-wrapper">
        <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
                <a href="/dashboard"><i class="fas fa-home me-1"></i>Inicio</a>
            </li>
            <li class="breadcrumb-item">Seguridad</li>
            <li class="breadcrumb-item">
                <a href="/seguridad/usuario">Usuario</a>
            </li>
            <li class="breadcrumb-item active" id="breadcrumbAccion">Nuevo</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card">
                <div class="card-header">
                    <span id="cardTitulo">
                        <i class="fas fa-plus me-2"></i>Nuevo Usuario
                    </span>
                </div>
                <div class="card-body">

                    <div id="alertError" class="alert alert-danger d-none">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span id="alertMensaje"></span>
                    </div>

                    <input type="hidden" id="usuarioId"
                           th:value="${modo == 'editar' ? usuarioId : ''}">

                    <!-- SECCIÓN IMAGEN -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold d-block">Foto de Usuario</label>
                        <div class="row align-items-center g-3">
                            <div class="col-auto">
                                <div class="img-preview-wrapper">
                                    <img id="imgPreview"
                                         src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                                         alt="Preview">
                                </div>
                            </div>
                            <div class="col">
                                <div class="upload-area" id="uploadArea">
                                    <i class="fas fa-cloud-upload-alt fa-2x text-primary mb-2 d-block"></i>
                                    <p class="mb-1 fw-semibold">Arrastra tu imagen aquí</p>
                                    <small class="text-muted">o haz clic para seleccionar</small>
                                    <br>
                                    <small class="text-muted">JPG, PNG, GIF, WEBP — Máx. 5MB</small>
                                </div>
                                <input type="file" id="inputImagen"
                                       accept="image/jpeg,image/png,image/gif,image/webp">
                                <div id="estadoImagen" class="mt-2"></div>
                            </div>
                        </div>
                    </div>

                    <hr class="mb-4">

                    <!-- DATOS -->
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Usuario <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="usuarioNombre" class="form-control"
                                   placeholder="Nombre de usuario" maxlength="100">
                            <div class="invalid-feedback" id="errorNombre"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Contraseña
                                <span class="text-danger" id="pwdRequerido">*</span>
                                <small class="text-muted" id="pwdOpcional" style="display:none;">
                                    (dejar vacío para no cambiar)
                                </small>
                            </label>
                            <div class="input-group">
                                <input type="password" id="usuarioPwd" class="form-control"
                                       placeholder="Contraseña" maxlength="100">
                                <button class="btn btn-outline-secondary" type="button"
                                        id="togglePwd">
                                    <i class="fas fa-eye" id="eyeIconPwd"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" id="errorPwd"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Perfil <span class="text-danger">*</span>
                            </label>
                            <select id="usuarioPerfil" class="form-select">
                                <option value="">-- Selecciona un perfil --</option>
                            </select>
                            <div class="invalid-feedback" id="errorPerfil"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">
                                Estado <span class="text-danger">*</span>
                            </label>
                            <select id="usuarioEstado" class="form-select">
                                <option value="">-- Selecciona estado --</option>
                            </select>
                            <div class="invalid-feedback" id="errorEstado"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo</label>
                            <input type="email" id="usuarioCorreo" class="form-control"
                                   placeholder="correo@ejemplo.com" maxlength="150">
                            <div class="invalid-feedback" id="errorCorreo"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Número Celular</label>
                            <input type="text" id="usuarioCelular" class="form-control"
                                   placeholder="0000000000" maxlength="20">
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="button" class="btn btn-primary" id="btnGuardar">
                            <i class="fas fa-save me-1"></i>Guardar
                        </button>
                        <a href="/seguridad/usuario" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMensaje"></div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    const MODO       = /*[[${modo}]]*/ 'nuevo';
    const USUARIO_ID = /*[[${usuarioId != null ? usuarioId : 0}]]*/ 0;
    /*]]>*/
</script>
<script th:src="@{/js/usuario-form.js}"></script>
</body>
</html>
