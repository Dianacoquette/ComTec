<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComTec - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #0d6efd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 430px;
        }
        .login-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #0d6efd, #1e3a5f);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.9rem; color: #fff;
        }
        .login-title { font-size: 1.9rem; font-weight: 700; color: #1e3a5f; margin-bottom: .2rem; }
        .login-subtitle { color: #6c757d; font-size: .88rem; }
        .btn-login {
            padding: .75rem; font-size: 1rem;
            font-weight: 600; border-radius: 8px;
            margin-top: .4rem;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 .2rem rgba(13,110,253,.15);
        }
        .login-footer { text-align: center; margin-top: 1.5rem; }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Header -->
    <div class="text-center mb-4">
        <div class="login-logo">
            <i class="fas fa-network-wired"></i>
        </div>
        <h1 class="login-title">ComTec</h1>
        <p class="login-subtitle">Sistema de Gestión Corporativo</p>
    </div>

    <!-- Alerta error -->
    <div id="alertError" class="alert alert-danger d-none" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span id="alertMessage"></span>
    </div>

    <!-- Campos -->
    <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
            <span class="input-group-text bg-white">
                <i class="fas fa-user text-primary"></i>
            </span>
            <input type="text" id="username" class="form-control"
                   placeholder="Ingresa tu usuario" autocomplete="username">
        </div>
    </div>

    <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
            <span class="input-group-text bg-white">
                <i class="fas fa-lock text-primary"></i>
            </span>
            <input type="password" id="password" class="form-control"
                   placeholder="Ingresa tu contraseña" autocomplete="current-password">
            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
        </div>
    </div>

    <!-- reCAPTCHA -->
    <div class="mb-3 d-flex justify-content-center">
        <div class="g-recaptcha"
             th:attr="data-sitekey=${recaptchaSiteKey}">
        </div>
    </div>

    <!-- Botón -->
    <button type="button" id="btnLogin" class="btn btn-primary w-100 btn-login">
        <span id="btnText">
            <i class="fas fa-sign-in-alt me-2"></i>Ingresar
        </span>
        <span id="btnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2"></span>Verificando...
        </span>
    </button>

    <div class="login-footer">
        <small class="text-muted">© 2025 ComTec. Todos los derechos reservados.</small>
    </div>
</div>

<!-- Scripts -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
