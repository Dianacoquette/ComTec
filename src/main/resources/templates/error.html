<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComTec - Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="text-center">
        <div class="mb-4" style="font-size: 6rem; color: #dc3545;">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="display-1 fw-bold text-danger" th:text="${status}">500</h1>
        <h2 class="mb-3" th:text="${message}">Error inesperado</h2>
        <p class="text-muted mb-4">Algo salió mal. Por favor intenta de nuevo.</p>
        <a href="/login" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>Volver al inicio
        </a>
    </div>
</div>
</body>
</html>
